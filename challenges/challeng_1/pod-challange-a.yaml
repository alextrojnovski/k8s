apiVersion: v1
kind: Pod
metadata:
  name: challenge-pod
  labels:
    app: challenge
    tutorial: configmap-demo
spec:
  containers:
  - name: app-container
    image: busybox:latest
    command: ["sh", "-c"]
    args:
    - |
      echo "=== Проверяем переменные окружения ==="
      echo "LOG_LEVEL = $LOG_LEVEL"
      echo "APP_MODE = $APP_MODE"
      echo "MAX_USERS = $MAX_USERS"
      echo "CACHE_TTL = $CACHE_TTL"
      echo ""
      echo "=== Все переменные окружения ==="
      env | sort
      echo ""
      echo "=== Контейнер будет работать 1 час ==="
      echo "Чтобы зайти внутрь: kubectl exec -it challenge-pod -- sh"
      sleep 3600
    env:
    - name: LOG_LEVEL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: LOG_LEVEL
    - name: APP_MODE
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_MODE
    - name: MAX_USERS
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: MAX_USERS
    - name: CACHE_TTL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: CACHE_TTL
    # Добавим переменную не из ConfigMap для сравнения
    - name: DIRECT_VAR
      value: "Это переменная заданная напрямую"
  restartPolicy: Never
