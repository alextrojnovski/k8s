apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-demo
  template:
    metadata:
      labels:
        app: cicd-demo
    spec:
      containers:
      - name: app
        image: alexandroli/cicd-demo-app:latest
        imagePullPolicy: Never  # ВАЖНО: Never заставит использовать только локальный образ
        ports:
        - containerPort: 5000
        env:
        - name: ENV
          value: "production"
